version: 2

project_name: recall

builds:
  - binary: recall
    goos: [darwin]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=1
    tags:
      - sqlite_fts5
    ldflags:
      - -s -w
      - -X recall/cmd/setup.Version={{.Version}}
      - -X recall/cmd/setup.Commit={{.Commit}}
      - -X recall/cmd/setup.Date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_darwin_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: Sadham-Hussian
    name: recall