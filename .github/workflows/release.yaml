name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            config: .goreleaser.linux.yaml
            publish: false
          - os: macos-latest
            config: .goreleaser.darwin.yaml
            publish: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y gcc

      # 👇 Linux: build only, no publish
      - name: Run GoReleaser (build only)
        if: matrix.publish == false
        uses: goreleaser/goreleaser-action@v5
        with:
          version: v2.0.0
          args: release --clean --skip publish --config ${{ matrix.config }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 👇 macOS: full release (publishes everything)
      - name: Run GoReleaser (publish)
        if: matrix.publish == true
        uses: goreleaser/goreleaser-action@v5
        with:
          version: v2.0.0
          args: release --clean --config ${{ matrix.config }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}