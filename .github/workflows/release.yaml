name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            config: .goreleaser.linux-amd64.yaml

          - os: ubuntu-latest
            config: .goreleaser.linux-arm64.yaml
            arm: true

          - os: macos-latest
            config: .goreleaser.darwin.yaml

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      # 👇 enable ARM emulation
      - name: Set up QEMU
        if: matrix.arm == true
        uses: docker/setup-qemu-action@v3

      # ✅ FIX: only run on Ubuntu
      - name: Install dependencies (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          version: v2.0.0
          args: release --clean --skip validate --config ${{ matrix.config }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}