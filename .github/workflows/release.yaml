name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Build Linux artifacts
        uses: goreleaser/goreleaser-action@v5
        with:
          version: v2.0.0
          args: release --clean --skip publish --config .goreleaser.linux.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: dist/*

  release:
    needs: build-linux
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: dist-linux

      # Clean dist so GoReleaser can run
      - name: Prepare dist
        run: rm -rf dist

      # Build mac artifacts (no publish yet)
      - name: Build mac artifacts
        uses: goreleaser/goreleaser-action@v5
        with:
          version: v2.0.0
          args: release --clean --skip publish --skip validate --config .goreleaser.darwin.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Merge Linux + mac artifacts
      - name: Merge artifacts
        run: cp -r dist-linux/* dist/

      # Final publish (everything together)
      - name: Publish release
        uses: goreleaser/goreleaser-action@v5
        with:
          version: v2.0.0
          args: release --skip validate --config .goreleaser.darwin.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}