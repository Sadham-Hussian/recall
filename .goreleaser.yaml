version: 2

project_name: recall

builds:
  - binary: recall
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    tags:
      - sqlite_fts5
    env:
      - CGO_ENABLED=1

archives:
  - formats: tar.gz

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: Sadham-Hussian
    name: recall