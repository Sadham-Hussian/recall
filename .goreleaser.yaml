version: 2

project_name: recall

builds:
  - id: recall-linux
    binary: recall
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
    tags:
      - sqlite_fts5

  - id: recall-darwin
    binary: recall
    goos: [darwin]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=1
    tags:
      - sqlite_fts5

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: Sadham-Hussian
    name: recall