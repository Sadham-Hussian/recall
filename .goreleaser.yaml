version: 2

project_name: recall

builds:
  - id: recall
    binary: recall
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=1
    tags:
      - sqlite_fts5

    # 👇 key part
    hooks:
      pre: echo "Building for $GOOS"

    # 👇 filter by GOOS from CI
    skip: "{{ ne .Os .Env.GOOS }}"

    # 👇 important: build only for current OS
    ignore:
      - goos: darwin
        goarch: amd64
        # handled in mac job
      - goos: darwin
        goarch: arm64
      - goos: linux
        goarch: amd64
        # handled in linux job