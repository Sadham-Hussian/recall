version: 2

project_name: recall

builds:
  - binary: recall
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
    tags:
      - sqlite_fts5

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_linux_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: Sadham-Hussian
    name: recall