version: 2

project_name: recall

builds:
  - binary: recall
    goos: [linux]
    goarch: [arm64]
    env:
      - CGO_ENABLED=1
    tags:
      - sqlite_fts5

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_linux_arm64"

release:
  github:
    owner: Sadham-Hussian
    name: recall